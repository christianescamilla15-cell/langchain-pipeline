name: CI Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=services --cov=gateway --cov-report=term-missing

      - name: Check test count
        run: |
          count=$(python -m pytest tests/ --co -q 2>/dev/null | tail -1 | grep -oP '\d+')
          echo "Test count: $count"
          if [ "$count" -lt 100 ]; then
            echo "ERROR: Test count dropped below 100!"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff

      - name: Run linter
        run: ruff check services/ gateway/ --select E,W,F --ignore E501
