version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODE=demo
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
